<svg width="800" height="160" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="grad1" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#667eea;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#764ba2;stop-opacity:1" />
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="2" dy="2" stdDeviation="3" flood-color="rgba(0,0,0,0.3)"/>
    </filter>
  </defs>
  
  <!-- Background -->
  <rect width="800" height="160" fill="url(#grad1)" rx="8"/>
  
  <!-- Fractal pattern decoration -->
  <g fill="rgba(255,255,255,0.1)">
    <circle cx="100" cy="50" r="20"/>
    <circle cx="140" cy="70" r="12"/>
    <circle cx="170" cy="45" r="8"/>
    <circle cx="190" cy="65" r="5"/>
    
    <circle cx="650" cy="110" r="20"/>
    <circle cx="690" cy="90" r="12"/>
    <circle cx="720" cy="115" r="8"/>
    <circle cx="740" cy="95" r="5"/>
  </g>
  
  <!-- Main title -->
  <text x="400" y="75" text-anchor="middle" fill="white" font-family="'Segoe UI', 'Arial', sans-serif" font-size="42" font-weight="bold" filter="url(#shadow)">
    Fractal-Down
  </text>
  
  <!-- Subtitle -->
  <text x="400" y="110" text-anchor="middle" fill="rgba(255,255,255,0.9)" font-family="'Segoe UI', 'Arial', sans-serif" font-size="16" font-weight="300">
    Production-grade DAG evaluation with √N memory and fractal priority scheduling
  </text>
  
  <!-- Mathematical notation -->
  <text x="400" y="135" text-anchor="middle" fill="rgba(255,255,255,0.7)" font-family="'Courier New', monospace" font-size="14">
    O(√N) memory • fractal priority • deterministic replay
  </text>
</svg>
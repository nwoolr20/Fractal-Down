name: CI

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main, develop ]

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4
    
    - name: Set up Python 3.11
      uses: actions/setup-python@v4
      with:
        python-version: "3.11"
    
    - name: Install linting dependencies
      run: |
        python -m pip install --upgrade pip
        pip install black flake8 mypy
    
    - name: Check code formatting with Black
      run: |
        black --check --diff fractal_down/ tests/
    
    - name: Lint with flake8
      run: |
        # Stop on errors, ignore line length (Black handles this)
        flake8 fractal_down/ tests/ --count --select=E9,F63,F7,F82 --show-source --statistics
        # Check for complexity and other issues
        flake8 fractal_down/ tests/ --count --max-complexity=12 --max-line-length=88 --statistics
    
    - name: Type checking with mypy (optional checks)
      run: |
        mypy fractal_down/ --ignore-missing-imports --no-strict-optional || true

  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.10", "3.11", "3.12"]

    steps:
    - uses: actions/checkout@v4
    
    - name: Set up Python ${{ matrix.python-version }}
      uses: actions/setup-python@v4
      with:
        python-version: ${{ matrix.python-version }}
    
    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install .[test]
    
    - name: Run tests
      run: |
        pytest -v --tb=short
    
    - name: Run tests with coverage
      if: matrix.python-version == '3.11'
      run: |
        pip install pytest-cov
        pytest --cov=fractal_down --cov-report=xml --cov-report=term
    
    - name: Upload coverage to Codecov
      if: matrix.python-version == '3.11'
      uses: codecov/codecov-action@v3
      with:
        file: ./coverage.xml
        fail_ci_if_error: false

  build:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4
    
    - name: Set up Python 3.11
      uses: actions/setup-python@v4
      with:
        python-version: "3.11"
    
    - name: Build wheel
      run: |
        pip install build
        python -m build
    
    - name: Test CLI smoke test
      run: |
        pip install dist/*.whl
        fd init-sample
        fd eval --budget 2 --verify